<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="material-symbols-outlined header-icon">shield</span>
      <h1 class="logo">Tab Guard</h1>
    </div>
    <div class="header-actions">
      <a id="dashboard-link" class="header-btn" title="Dashboard">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="header-btn-label">Dashboard</span>
      </a>
      <a id="settings-link" class="header-btn-icon" title="Einstellungen">
        <span class="material-symbols-outlined">settings</span>
      </a>
    </div>
  </header>

  <!-- Tab Navigation (Pills) -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="active">Aktiv</button>
    <button class="tab-btn" data-tab="closed">Geschlossen</button>
    <button class="tab-btn" data-tab="history">History</button>
  </nav>

  <!-- Active Tab -->
  <div id="tab-active" class="tab-content active">
    <div id="active-windows" class="window-list">
      <p class="empty-state">Lade Fenster...</p>
    </div>
  </div>

  <!-- Closed Tab -->
  <div id="tab-closed" class="tab-content">
    <div id="closed-windows" class="window-list"></div>
    <div class="section-label">Einzelne Tabs</div>
    <div id="closed-tabs" class="tab-list"></div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-content">
    <div class="history-placeholder">
      <span class="material-symbols-outlined history-icon">history</span>
      <p>Komplette 30-Tage-History im Dashboard ansehen.</p>
      <button id="open-dashboard" class="btn-primary">
        <span class="material-symbols-outlined btn-icon">open_in_new</span>
        Dashboard &#246;ffnen
      </button>
    </div>
  </div>

  <!-- Restore Banner -->
  <div id="restore-banner" class="restore-banner hidden">
    <div class="restore-info">
      <span class="material-symbols-outlined restore-icon">history</span>
      <div class="restore-text">
        <span class="restore-title">Letzte Session</span>
        <span id="restore-detail" class="restore-detail"></span>
      </div>
    </div>
    <button id="restore-all-btn" class="btn-restore-all">Alles wiederherstellen</button>
  </div>

  <!-- Footer -->
  <footer class="popup-footer">
    <span class="footer-copy">&copy; Tab Guard by</span>
    <a href="https://match2ad.de" target="_blank" class="brand-link">match2ad.de</a>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
